<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Data Viewer</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body>
<div id="app">

  <!-- Top bar -->
  <div id="topbar" class="d-flex align-items-center gap-2 flex-nowrap overflow-hidden">
    <span class="fw-bold text-light me-2" style="font-size:0.9rem; white-space:nowrap;">Map Data Viewer</span>

    <select id="file-select" class="form-select form-select-sm bg-dark text-light border-secondary" style="width:180px; flex-shrink:0;">
      <option value="">Select .mapdata file…</option>
    </select>
    <button id="load-btn" class="btn btn-primary btn-sm" style="flex-shrink:0;">Load</button>

    <div class="vr mx-1 bg-secondary" style="height:20px; flex-shrink:0;"></div>

    <div class="btn-group btn-group-sm" style="flex-shrink:0;">
      <button class="btn btn-outline-light mode-btn active" data-mode="view" title="View and inspect features">
        <span class="d-none d-sm-inline">VIEW (V)</span><span class="d-sm-none">V</span>
      </button>
      <button class="btn btn-outline-light mode-btn" data-mode="edit" title="Edit annotation shapes">
        <span class="d-none d-sm-inline">EDIT (E)</span><span class="d-sm-none">E</span>
      </button>
      <button class="btn btn-outline-light mode-btn" data-mode="add" title="Add obstacle/barrier annotation">
        <span class="d-none d-sm-inline">+ OBS (A)</span><span class="d-sm-none">+O</span>
      </button>
      <button class="btn btn-outline-light mode-btn" data-mode="path" title="Add path annotation">
        <span class="d-none d-sm-inline">+ PATH (P)</span><span class="d-sm-none">+P</span>
      </button>
      <button class="btn btn-outline-light mode-btn" data-mode="delete" title="Delete annotations">
        <span class="d-none d-sm-inline">DEL (D)</span><span class="d-sm-none">D</span>
      </button>
    </div>

    <div class="vr mx-1 bg-secondary" style="height:20px; flex-shrink:0;"></div>

    <button class="btn btn-outline-info btn-sm mode-btn" data-mode="fetch" title="Fetch area from OSM Overpass" style="flex-shrink:0;">
      <span class="d-none d-sm-inline">FETCH (F)</span><span class="d-sm-none">F</span>
    </button>

    <div class="vr mx-1 bg-secondary" style="height:20px; flex-shrink:0;"></div>

    <button id="export-btn" class="btn btn-warning btn-sm" style="flex-shrink:0;" disabled>Export</button>

    <div id="status" class="text-secondary ms-auto px-2" style="font-size:0.75rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></div>
  </div>

  <!-- Main layout -->
  <div id="main">

    <!-- Sidebar -->
    <div id="sidebar">

      <!-- Layers panel -->
      <div class="panel">
        <div class="panel-title">LAYERS</div>

        <!-- Road -->
        <div class="layer-row">
          <input type="checkbox" class="st-check" data-layer="road" checked>
          <div class="layer-swatch" style="background:#333; border:1px solid #555;"></div>
          <span>Roads</span>
          <button class="subtype-btn" data-subtype-toggle="road">▼</button>
        </div>
        <div id="subfilter-road" class="subtype-panel"></div>

        <!-- Footway -->
        <div class="layer-row">
          <input type="checkbox" class="st-check" data-layer="footway" checked>
          <div class="layer-swatch" style="background:#FFD700; border:1px solid #b89900;"></div>
          <span>Footways</span>
          <button class="subtype-btn" data-subtype-toggle="footway">▼</button>
        </div>
        <div id="subfilter-footway" class="subtype-panel"></div>

        <!-- Barrier -->
        <div class="layer-row">
          <input type="checkbox" class="st-check" data-layer="barrier" checked>
          <div class="layer-swatch" style="background:#BF0009; border:1px solid #8b0000;"></div>
          <span>Barriers</span>
          <button class="subtype-btn" data-subtype-toggle="barrier">▼</button>
        </div>
        <div id="subfilter-barrier" class="subtype-panel"></div>

        <!-- Annotation -->
        <div class="layer-row">
          <input type="checkbox" class="st-check" data-layer="annotation" checked>
          <div class="layer-swatch" style="background:#ff8c00; border:1px solid #cc5500;"></div>
          <span>Annotations</span>
        </div>

        <!-- Waypoints -->
        <div class="layer-row">
          <input type="checkbox" class="st-check" data-layer="waypoint">
          <div class="layer-swatch" style="background:#50C2F6; border:1px solid #000;"></div>
          <span>Waypoints</span>
        </div>
      </div>

      <!-- Properties panel -->
      <div class="panel" style="flex: 1; border-bottom: none; overflow-y: auto;">
        <div class="panel-title">PROPERTIES</div>
        <div id="props-content" class="text-secondary" style="font-style:italic;">
          Click a feature to inspect
        </div>
      </div>

      <!-- Bottom stacked collapsible panels -->
      <div id="ann-panel" class="bottom-panel" style="display:none;">
        <div class="bottom-panel-header" onclick="togglePanel('ann')">
          <h6 class="bottom-panel-title">ANNOTATIONS <span id="ann-count"></span></h6>
          <span id="ann-toggle" class="panel-toggle-icon">▲</span>
        </div>
        <div id="ann-body" class="bottom-panel-body">
          <div id="ann-list"></div>
        </div>
      </div>

      <div id="changes-panel" class="bottom-panel" style="display:none;">
        <div class="bottom-panel-header" onclick="togglePanel('changes')">
          <h6 class="bottom-panel-title">CHANGES <span id="changes-count"></span></h6>
          <span id="changes-toggle" class="panel-toggle-icon">▲</span>
        </div>
        <div id="changes-body" class="bottom-panel-body">
          <div id="changes-list"></div>
        </div>
      </div>

      <div id="hidden-panel" class="bottom-panel" style="display:none;">
        <div class="bottom-panel-header" onclick="togglePanel('hidden')">
          <h6 class="bottom-panel-title">HIDDEN <span id="hidden-count"></span></h6>
          <span id="hidden-toggle" class="panel-toggle-icon">▲</span>
        </div>
        <div id="hidden-body" class="bottom-panel-body">
          <div id="hidden-list"></div>
        </div>
      </div>

    </div>

    <!-- Map -->
    <div id="map"></div>
  </div>
</div>

<!-- Fetch Area Modal -->
<div class="modal fade" id="fetch-area-modal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content bg-dark text-light border-secondary">
      <div class="modal-header border-secondary py-2">
        <h6 class="modal-title">Fetch OSM Area</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body py-2">
        <label class="form-label text-secondary mb-1" style="font-size:0.72rem;">NAME</label>
        <input id="area-name-input" type="text" placeholder="e.g. prague_center"
               class="form-control form-control-sm bg-dark text-light border-secondary">
        <div class="form-text text-secondary mt-1" style="font-size:0.65rem;">
          The area will be saved as <code>NAME.mapdata</code>.
        </div>
      </div>
      <div class="modal-footer border-secondary py-2">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="fetch-area-submit" class="btn btn-primary btn-sm">Fetch & Parse</button>
      </div>
    </div>
  </div>
</div>

<!-- Annotation Detail Modal -->
<div class="modal fade" id="ann-detail-modal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content bg-dark text-light border-secondary">
      <div class="modal-header border-secondary py-2">
        <h6 class="modal-title" id="ann-detail-title">New Annotation</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body py-2" style="max-height:400px;overflow-y:auto;">
        <div class="mb-3">
          <label class="form-label text-secondary mb-1" style="font-size:0.72rem;">TYPE</label>
          <select id="ann-type-sel" class="form-select form-select-sm bg-dark text-light border-secondary"
                  onchange="updateAnnTypeFields()">
            <option value="obstacle">Obstacle (Area)</option>
            <option value="path">Path (LineString)</option>
          </select>
        </div>

        <div id="ann-obstacle-fields">
          <label class="form-label text-secondary mb-1" style="font-size:0.72rem;">BARRIER TYPE</label>
          <select id="ann-barrier-sel" class="form-select form-select-sm bg-dark text-light border-secondary">
            <option value="wall">Wall</option>
            <option value="fence">Fence</option>
            <option value="hedge">Hedge</option>
            <option value="bollard">Bollard</option>
            <option value="gate">Gate</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div id="ann-path-fields" style="display:none;">
          <label class="form-label text-secondary mb-1" style="font-size:0.72rem;">HIGHWAY TYPE</label>
          <select id="ann-highway-sel" class="form-select form-select-sm bg-dark text-light border-secondary">
            <option value="footway">Footway</option>
            <option value="path">Path</option>
            <option value="pedestrian">Pedestrian</option>
            <option value="cycleway">Cycleway</option>
            <option value="service">Service</option>
          </select>
          <label class="form-label text-secondary mb-1 mt-2" style="font-size:0.72rem;">WIDTH (m)</label>
          <input id="ann-width-inp" type="number" min="0.1" step="0.1" value="1.5"
                 class="form-control form-control-sm bg-dark text-light border-secondary">
        </div>

        <div>
          <label class="form-label text-secondary mb-1" style="font-size:0.72rem;">EXTRA PROPERTIES</label>
          <div id="ann-extra-props"></div>
          <button type="button" id="ann-add-prop-btn"
                  class="btn btn-sm btn-outline-secondary mt-1" style="font-size:0.72rem;">
            + Add property
          </button>
        </div>

      </div>
      <div class="modal-footer border-secondary py-2">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="ann-detail-save" class="btn btn-warning btn-sm">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- Way properties edit modal -->
<div class="modal fade" id="way-edit-modal" tabindex="-1">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content bg-dark text-light border-secondary">
      <div class="modal-header border-secondary py-2">
        <h6 class="modal-title" id="way-edit-title">Edit Way Properties</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body py-2" style="font-size:0.82rem;max-height:360px;overflow-y:auto;">
        <div id="way-edit-props"></div>
        <button type="button" id="way-edit-add-prop-btn"
                class="btn btn-sm btn-outline-secondary mt-1" style="font-size:0.72rem;">
          + Add property
        </button>
      </div>
      <div class="modal-footer border-secondary py-2">
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button type="button" id="way-edit-save" class="btn btn-warning btn-sm">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS modules -->
<script src="{{ url_for('static', filename='js/state.js') }}"></script>
<script src="{{ url_for('static', filename='js/utils.js') }}"></script>
<script src="{{ url_for('static', filename='js/api.js') }}"></script>
<script src="{{ url_for('static', filename='js/ui_handlers.js') }}"></script>
<script src="{{ url_for('static', filename='js/layers.js') }}"></script>
<script src="{{ url_for('static', filename='js/draw_handlers.js') }}"></script>
<script src="{{ url_for('static', filename='js/map_setup.js') }}"></script>

</body>
</html>
